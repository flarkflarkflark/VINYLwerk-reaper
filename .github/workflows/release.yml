name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.34.0)'
        required: true
        default: 'v1.34.0'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Create Release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev libgtk-3-dev

      - name: Configure CMake
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config Release --target vinylwerk_cli

      - name: Collect and Package
        shell: bash
        run: |
          mkdir -p release-files
          VERSION=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            CLI_BIN=$(find build -name "vinylwerk_cli.exe" | head -1)
            PKG_NAME="VINYLwerk-Windows-$VERSION.zip"
            cp "$CLI_BIN" .
            cp Scripts/VINYLwerk.lua .
            cp Installation/install.ps1 .
            7z a "$PKG_NAME" vinylwerk_cli.exe VINYLwerk.lua install.ps1
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            CLI_BIN=$(find build -name "vinylwerk_cli" | head -1)
            PKG_NAME="VINYLwerk-macOS-$VERSION.zip"
            cp "$CLI_BIN" .
            cp Scripts/VINYLwerk.lua .
            cp Installation/install.sh .
            chmod +x vinylwerk_cli install.sh
            zip -r "$PKG_NAME" vinylwerk_cli VINYLwerk.lua install.sh
          else
            CLI_BIN=$(find build -name "vinylwerk_cli" | head -1)
            PKG_NAME="VINYLwerk-Linux-$VERSION.zip"
            cp "$CLI_BIN" .
            cp Scripts/VINYLwerk.lua .
            cp Installation/install.sh .
            chmod +x vinylwerk_cli install.sh
            zip -r "$PKG_NAME" vinylwerk_cli VINYLwerk.lua install.sh
          fi
          mv *.zip release-files/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          files: release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
